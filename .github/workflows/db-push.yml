name: Database Migration

on:
  workflow_dispatch:           # allows manual trigger from GitHub UI
  push:
    branches: [ main ]         # optional: run automatically on push to main
    paths:
      - 'server/shared/schema.ts'   # only run when schema changes
      - 'drizzle.config.ts'

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # or 22/24, whichever your project uses

      - name: Install dependencies
        working-directory: ./server   # adjust if your package.json is elsewhere
        run: npm ci

      - name: Run Drizzle migrations
        working-directory: ./server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx drizzle-kit push   # or use 'migrate' if you prefer
