name: Database Migration

on:
  workflow_dispatch:                     # manual trigger
  push:
    branches: [ main ]
    paths:
      - './shared/schema.ts'
      - 'drizzle.config.ts'

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        
        run: npm install                 # installs all deps, including drizzle-kit and ts-node

      - name: Run Drizzle push (using TS config)
        
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx drizzle-kit push --config=drizzle.config.ts
